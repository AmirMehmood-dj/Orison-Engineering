<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Orison Engineering Services</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#2C3E50">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link rel="icon" type="image/png" href="assets/img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      background: var(--gray-50);
    }
    .error-page h1 {
      font-size: 120px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 10px;
    }
    .error-page h2 {
      font-size: 26px;
      margin-bottom: 16px;
      color: var(--dark);
    }
    .error-page p {
      font-size: 16px;
      color: var(--gray-500);
      margin-bottom: 30px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

<body>
  <div class="error-page">

      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
      <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
        <a href="index.html" class="btn btn-primary">Go to Homepage</a>
